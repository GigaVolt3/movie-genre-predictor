<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Genre Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h2 class="text-center mb-0">🎬 Movie Genre Predictor</h2>
                    </div>
                    <div class="card-body">
                        <form id="predictionForm">
                            <div class="mb-3">
                                <label for="director" class="form-label">Director</label>
                                <input type="text" class="form-control" id="director" required 
                                       list="directorList" placeholder="Start typing director's name..." autocomplete="off">
                                <datalist id="directorList">
                                    {% for director in directors %}
                                    <option value="{{ director }}">
                                    {% endfor %}
                                </datalist>
                            </div>
                            <div class="mb-3">
                                <label for="budget" class="form-label">Budget (INR Crores)</label>
                                <input type="number" step="0.01" class="form-control" id="budget" required
                                       placeholder="Enter movie budget in crores">
                            </div>
                            <div class="mb-3">
                                <label for="duration" class="form-label">Duration (minutes)</label>
                                <input type="number" class="form-control" id="duration" required
                                       placeholder="Enter movie duration in minutes">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Predict Genre
                                </button>
                            </div>
                        </form>

                        <div id="result" class="mt-4" style="display: none;">
                            <hr>
                            <h4 class="text-center mb-3">Prediction Results</h4>
                            <div class="alert alert-success">
                                <h5 class="alert-heading">Most Likely Genre: <span id="predictedGenre"></span></h5>
                                <p class="mb-0">Model Confidence: <span id="modelAccuracy"></span>%</p>
                            </div>
                            
                            <h5 class="mt-4">Top 3 Predictions:</h5>
                            <div id="topPredictions" class="list-group">
                                <!-- Predictions will be inserted here by JavaScript -->
                            </div>
                            
                            <div class="mt-3 text-muted text-center">
                                <small>Based on K-Nearest Neighbors algorithm</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
