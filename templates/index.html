<html lang="en">
<head>

      right: 0;
      border: 0;
      z-index: 1000;
    }
    .github-corner svg {
      fill: #2c3e50;
      color: white;
    }

      animation: octocat-wave 560ms ease-in-out;
    }
    @keyframes octocat-wave {
      0%, 100% { transform: rotate(0); }
      20%, 60% { transform: rotate(-25deg); }
      40%, 80% { transform: rotate(10deg); }
    }
    @media (max-width: 500px) {
      .github-corner:hover .octo-arm { animation: none; }
      .github-corner .octo-arm { animation: octocat-wave 560ms ease-in-out; }
    }
    
    body { position: relative;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
      background-color: #f5f7fa;
    }
    .container {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      margin-bottom: 30px;
    }
    .header {
      background: linear-gradient(135deg, #3498db, #2c3e50);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 2.5em;
    }
    .form-container {
      padding: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #2c3e50;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 16px;
      transition: all 0.3s;
    }
    input:focus, select:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }
    button {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
    }
    .advanced-view {
      margin-top: 30px;
      display: none;
    }
    .advanced-view h3 {
      color: #2c3e50;
      margin-top: 20px;
      border-bottom: 2px solid #3498db;
      padding-bottom: 5px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
      box-shadow: 0 2px 3px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    th {
      background-color: #3498db;
      color: white;
      font-weight: 600;
    }
    tr:nth-child(even) {
      background-color: #f8f9fa;
    }
    tr:hover {
      background-color: #f1f8ff;
    }
    .toggle-advanced {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
      display: inline-block;
    }
    .toggle-advanced:hover {
      background: #e9ecef;
    }
    .success {
      background-color: #e8f5e9;
      border-left: 4px solid #4caf50;
    }
    .error {
      background-color: #ffebee;
      border-left: 4px solid #f44336;
    }
    .loading {
      text-align: center;
      color: #7f8c8d;
      font-style: italic;
    }
    .prediction {
      font-size: 1.5em;
      font-weight: bold;
      color: #2c3e50;
      margin: 15px 0;
      text-align: center;
    }
    .dropdown-list {
      position: relative;
      background: white;
      border: 1px solid #ccc;
      max-height: 200px;
      overflow-y: auto;
      border-radius: 6px;
      display: none;
      margin-top: 5px;
      z-index: 1000;
    }
    
    .table-responsive {
      overflow-x: auto;
      max-height: 600px;
      overflow-y: auto;
      display: block;
      margin: 15px 0;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }
    .dropdown-list div {
      padding: 10px;
      cursor: pointer;
    }
    .dropdown-list div:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

    </svg>
  </a>
  
  <div class="container">
    <div class="header" style="position: relative;">
      <h1>🎬 Movie Genre Predictor</h1>
      <p>Predict movie genres based on budget, duration, and director using K-Nearest Neighbors</p>
    </div>

    <div class="form-container">
      <div class="form-group">
        <label for="budget">Movie Budget (in millions USD)</label>
        <input type="number" id="budget" placeholder="e.g., 100" min="0" step="0.01" required />
      </div>

      <div class="form-group">
        <label for="duration">Duration (in minutes)</label>
        <input type="number" id="duration" placeholder="e.g., 120" min="1" required />
      </div>

      <div class="form-group">
        <label for="directorSearch">Director</label>
        <input type="text" id="directorSearch" placeholder="Search or select director..." autocomplete="off" />
        <div id="directorList" class="dropdown-list"></div>
      </div>

      <button onclick="predictGenre()" id="predictBtn">Predict Genre</button>
      <div id="result"></div>
      
      <div class="advanced-view" id="advancedView">
        <div class="toggle-advanced" onclick="toggleAdvancedView()">Hide Advanced View</div>
        
        <div id="kNearestSection">
          <h3>Top 5 Nearest Neighbors (k=5)</h3>
          <div class="table-responsive">
            <table id="kNearestTable">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Distance</th>
                  <th>Budget</th>
                  <th>Runtime</th>
                  <th>Director</th>
                  <th>Genre</th>
                </tr>
              </thead>
              <tbody id="kNearestTableBody">
                <!-- Filled by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>

        <div id="allDistancesSection">
          <h3>All Distances (Top 1000)</h3>
          <div class="table-responsive">
            <table id="allDistancesTable">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Distance</th>
                  <th>Budget</th>
                  <th>Runtime</th>
                  <th>Director</th>
                  <th>Genre</th>
                </tr>
              </thead>
              <tbody id="allDistancesTableBody">
                <!-- Filled by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Convert Python list to JavaScript array
    const directors = JSON.parse('{{ directors|tojson|safe }}');
    
    const directorInput = document.getElementById('directorSearch');
    const directorDropdown = document.getElementById('directorList');

    function filterDirectors() {
      const query = directorInput.value.toLowerCase();
      const filtered = directors.filter(d => d.toLowerCase().includes(query));

      directorDropdown.innerHTML = '';
      if (filtered.length === 0) {
        directorDropdown.style.display = 'none';
        return;
      }

      filtered.forEach(director => {
        const item = document.createElement('div');
        item.textContent = director;
        item.onclick = () => {
          directorInput.value = director;
          directorDropdown.style.display = 'none';
        };
        directorDropdown.appendChild(item);
      });
      directorDropdown.style.display = 'block';
    }

    directorInput.addEventListener('input', filterDirectors);
    document.addEventListener('click', e => {
      if (!directorInput.contains(e.target) && !directorDropdown.contains(e.target)) {
        directorDropdown.style.display = 'none';
      }
    });

    function predictGenre() {
      const budget = document.getElementById('budget').value;
      const duration = document.getElementById('duration').value;
      const director = document.getElementById('directorSearch').value;
      const predictBtn = document.getElementById('predictBtn');
      const resultDiv = document.getElementById('result');

      if (!budget || !duration || !director) {
        showResult('Please fill in all fields', 'error');
        return;
      }

      predictBtn.disabled = true;
      predictBtn.innerHTML = 'Predicting...';
      resultDiv.style.display = 'block';
      resultDiv.className = 'loading';
      resultDiv.innerHTML = 'Analyzing movie details...';

      fetch('/predict', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          budget: parseFloat(budget),
          duration: parseFloat(duration),
          director: director
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          showResult(
            'Based on our analysis:<br><br>' +
            `Budget: $${budget}M<br>` +
            `Duration: ${duration} minutes<br>` +
            `Director: ${director}<br><br>` +
            `<div class="prediction">Predicted Genre: ${data.prediction}</div>`,
            'success'
          );
          
          // Update and show advanced view
          updateAdvancedView(data);
        } else {
          throw new Error(data.message || 'Prediction failed');
        }
      })
      .catch(error => {
        showResult('An error occurred while making the prediction: ' + error.message, 'error');
      })
      .finally(() => {
        predictBtn.disabled = false;
        predictBtn.innerHTML = 'Predict Genre';
      });
    }

    function showResult(message, type) {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.className = type;
      resultDiv.innerHTML = message;
    }

    function toggleAdvancedView() {
      const advancedView = document.getElementById('advancedView');
      const toggleBtn = advancedView.querySelector('.toggle-advanced');
      
      if (advancedView.style.display === 'block') {
        advancedView.style.display = 'none';
        toggleBtn.textContent = 'Show Advanced View';
      } else {
        advancedView.style.display = 'block';
        toggleBtn.textContent = 'Hide Advanced View';
      }
    }

    function updateAdvancedView(data) {
      // Update k value
      document.getElementById('kValue').textContent = data.best_k;
      
      // Update k-nearest neighbors table
      const kNearestTbody = document.getElementById('kNearestTableBody');
      kNearestTbody.innerHTML = '';
      
      data.k_nearest.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.rank}</td>
          <td>${item.distance.toFixed(4)}</td>
          <td>$${item.budget.toLocaleString()}</td>
          <td>${item.runtime} min</td>
          <td>${item.director}</td>
          <td>${item.genre}</td>
        `;
        kNearestTbody.appendChild(row);
      });
      
      // Update all distances table
      const allDistancesTbody = document.getElementById('allDistancesTableBody');
      allDistancesTbody.innerHTML = '';
      
      data.all_distances.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.rank}</td>
          <td>${item.distance.toFixed(4)}</td>
          <td>$${item.budget.toLocaleString()}</td>
          <td>${item.runtime} min</td>
          <td>${item.director}</td>
          <td>${item.genre}</td>
        `;
        allDistancesTbody.appendChild(row);
      });
      
      // Show the advanced view
      document.getElementById('advancedView').style.display = 'block';
    }

    // Enter key triggers prediction
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', function (e) {
          if (e.key === 'Enter') {
            predictGenre();
          }
        });
      });
    });
  </script>
</body>
</html>
